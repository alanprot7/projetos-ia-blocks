<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a1a">
  <title>Blocks</title>
  <link rel="stylesheet" href="style.css?v=12">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
    <p class="loading-text">Gerando puzzle...</p>
  </div>

  <div id="menu-screen" class="screen">
    <button id="btn-go-random" class="go-random-btn">Aleatórios</button>
    <button id="btn-reset-score" class="reset-score-btn">reset</button>
    <h1 class="title">Blocks</h1>
    <nav class="level-grid" id="level-grid"></nav>
  </div>

  <div id="random-screen" class="screen" style="display: none;">
    <button id="btn-back-to-menu" class="back-to-menu-btn">Menu</button>
    <button id="btn-delete-levels" class="delete-levels-btn">Apagar Níveis</button>
    <h1 class="title">Blocks</h1>
    <h2 class="subtitle">Aleatórios</h2>
    <nav class="level-grid" id="random-grid"></nav>
  </div>

  <div id="game-screen" class="screen" style="display: none;">
    <header class="game-header">
      <button id="btn-back" class="header-btn">Voltar</button>
      <span id="level-indicator" class="level-indicator"></span>
      <button id="btn-reset" class="header-btn">Reiniciar</button>
    </header>
    <span id="move-counter" class="move-counter"></span>
    <div id="board" class="board"></div>
  </div>

  <script src="script.js?v=12"></script>
</body>
</html>
